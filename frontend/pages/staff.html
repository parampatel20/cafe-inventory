<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <h2>Staff Management</h2>
    </div>
    <div class="section-card">
      <h3>Add Staff</h3>
      <div id="alert" class="alert" style="display:none"></div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" placeholder="Staff name"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Staff email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Password"/>
      </div>
      <div class="form-group">
        <label>Permissions</label>
        <label><input type="checkbox" id="canUploadBills"/> Can Upload Bills</label><br/>
        <label><input type="checkbox" id="canAddInventory" checked/> Can Add Inventory</label><br/>
        <label><input type="checkbox" id="canViewInventory" checked/> Can View Inventory</label>
      </div>
      <button class="btn btn-primary" onclick="addStaff()">Add Staff</button>
    </div>
    <div class="section-card">
      <h3>All Staff</h3>
      <div class="table-container">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="staffTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
  checkAuth();
  checkAdmin();
  loadSidebar('staff');

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  async function loadStaff() {
    const staff = await apiFetch('/staff');
    const tbody = document.getElementById('staffTable');
    tbody.innerHTML = (staff || []).map(s => `
      <tr>
        <td>${s.name}</td>
        <td>${s.email}</td>
        <td>${s.isActive ? '✅ Active' : '🚫 Disabled'}</td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick="disableStaff('${s._id}')">Disable</button>
          <button class="btn btn-danger btn-sm"    onclick="removeStaff('${s._id}')">Remove</button>
        </td>
      </tr>
    `).join('');
  }

  async function addStaff() {
    const body = {
      name:     document.getElementById('name').value,
      email:    document.getElementById('email').value,
      password: document.getElementById('password').value,
      permissions: {
        canUploadBills:   document.getElementById('canUploadBills').checked,
        canAddInventory:  document.getElementById('canAddInventory').checked,
        canViewInventory: document.getElementById('canViewInventory').checked
      }
    };
    if (!body.name || !body.email || !body.password)
      return showAlert('alert', 'Fill all fields');

    const data = await apiFetch('/staff', 'POST', body);
    if (data.id) {
      showAlert('alert', 'Staff added!', 'success');
      loadStaff();
    } else {
      showAlert('alert', data.message || 'Error');
    }
  }

  async function disableStaff(id) {
    if (!confirm('Disable this staff?')) return;
    await apiFetch(`/staff/${id}/disable`, 'PATCH');
    loadStaff();
  }

  async function removeStaff(id) {
    if (!confirm('Remove this staff permanently?')) return;
    await apiFetch(`/staff/${id}`, 'DELETE');
    loadStaff();
  }

  loadStaff();
</script>
</body>
</html>
