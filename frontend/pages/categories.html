<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Categories</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <h2>Categories</h2>
    </div>
    <div class="section-card">
      <h3>All Categories</h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Sub Categories</th>
            </tr>
          </thead>
          <tbody id="catTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
  checkAuth();
  loadSidebar('categories');

  async function loadCategories() {
    var cats  = await apiFetch('/categories');
    var tbody = document.getElementById('catTable');

    if (!cats || cats.length === 0) {
      tbody.innerHTML = '<tr><td colspan="2">No categories found</td></tr>';
      return;
    }

    var html = '';
    cats.forEach(function(c) {
      var subs = Array.isArray(c.subCategories) ? c.subCategories.join(', ') : '';
      html += '<tr>';
      html += '<td><strong>' + c.categoryName + '</strong></td>';
      html += '<td>' + subs + '</td>';
      html += '</tr>';
    });
    tbody.innerHTML = html;
  }

  loadCategories();
</script>
</body>
</html>
