<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Categories</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <h2>Categories</h2>
    </div>
    <div class="section-card">
      <h3>Add Sub Category</h3>
      <div id="alert" class="alert" style="display:none"></div>
      <div class="form-group">
        <label>Category</label>
        <select id="categoryName">
          <option value="">Select Category</option>
          <option value="Kitchen">Kitchen</option>
          <option value="Bar">Bar</option>
          <option value="Takeaway">Takeaway</option>
          <option value="Crockery">Crockery</option>
        </select>
      </div>
      <div class="form-group">
        <label>Sub Categories (comma separated)</label>
        <input type="text" id="subCategories" placeholder="e.g. Pasta, Sauce, Cheese"/>
      </div>
      <button class="btn btn-primary" onclick="addCategory()">Save</button>
    </div>
    <div class="section-card">
      <h3>All Categories</h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Sub Categories</th>
              <th id="actionHeader">Actions</th>
            </tr>
          </thead>
          <tbody id="catTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
  checkAuth();
  loadSidebar('categories');
  var isAdmin = getUser().role === 'admin';

  if (!isAdmin) {
    document.getElementById('actionHeader').style.display = 'none';
  }

  async function loadCategories() {
    var cats  = await apiFetch('/categories');
    var tbody = document.getElementById('catTable');

    if (!cats || cats.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3">No categories yet</td></tr>';
      return;
    }

    var html = '';
    cats.forEach(function(c) {
      var subs = Array.isArray(c.subCategories) ? c.subCategories.join(', ') : '';
      html += '<tr>';
      html += '<td><strong>' + c.categoryName + '</strong></td>';
      html += '<td>' + subs + '</td>';
      html += '<td>';
      if (isAdmin) {
        html += '<button class="btn btn-danger btn-sm" onclick="deleteCategory(\'' + c._id + '\')">Delete</button>';
      }
      html += '</td>';
      html += '</tr>';
    });
    tbody.innerHTML = html;
  }

  async function addCategory() {
    var categoryName  = document.getElementById('categoryName').value;
    var subCategories = document.getElementById('subCategories').value
      .split(',').map(function(s) { return s.trim(); }).filter(Boolean);

    if (!categoryName) {
      showAlert('alert', 'Select a category');
      return;
    }
    if (subCategories.length === 0) {
      showAlert('alert', 'Enter at least one sub category');
      return;
    }

    var data = await apiFetch('/categories', 'POST', { categoryName: categoryName, subCategories: subCategories });
    if (data._id) {
      showAlert('alert', 'Category saved!', 'success');
      document.getElementById('categoryName').value  = '';
      document.getElementById('subCategories').value = '';
      loadCategories();
    } else {
      showAlert('alert', data.message || 'Error saving category');
    }
  }

  async function deleteCategory(id) {
    if (!confirm('Delete this category?')) return;
    await apiFetch('/categories/' + id, 'DELETE');
    loadCategories();
  }

  loadCategories();
</script>
</body>
</html>
