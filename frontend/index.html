<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Café Inventory — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #F5F0EB; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-box { background: #fff; padding: 2rem; border-radius: 12px; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #6F4E37; margin-bottom: 1.5rem; font-size: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; }
    input { width: 100%; padding: 0.7rem 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; }
    input:focus { border-color: #6F4E37; }
    button { width: 100%; padding: 0.8rem; background: #6F4E37; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    button:hover { background: #5a3e2b; }
    .alert { padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
    .alert-error { background: #fdecea; color: #e74c3c; }
    .alert-success { background: #eafaf1; color: #27ae60; }
  </style>
</head>
<body>
<div class="auth-box">
  <h2>☕ Café Inventory</h2>
  <div id="alert" class="alert"></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter email"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password"/>
  </div>
  <button onclick="login()">Login</button>
</div>

<script>
  const _host = window.location.hostname;
const API = 'https://cafe-inventory-18mx.onrender.com';
  const APP = window.location.origin;

  function getToken() { return localStorage.getItem('token'); }

  function showAlert(message, type = 'error') {
    const el = document.getElementById('alert');
    el.className = 'alert alert-' + type;
    el.textContent = message;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  if (getToken()) window.location.replace(APP + '/pages/dashboard.html');

  async function login() {
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (!email || !password) return showAlert('Fill all fields');

    try {
      const res  = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.replace(APP + '/pages/dashboard.html');
      } else {
        showAlert(data.message || 'Login failed');
      }
    } catch (err) {
      showAlert('Cannot connect to server. Make sure backend is running.');
    }
  }
</script>
</body>
</html>
